controller_manager:
  ros__parameters:
    update_rate: 100  # 控制器的刷新频率 (Hz)

    # 1. 广播器：负责读取 Gazebo 里的物理角度，发送给 RViz
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # 2. 轨迹控制器：负责接收你发的角度指令，驱动 Gazebo 里的虚拟电机
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    
    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    # 严格对应你在 xacro 里拼接出的关节名称
    joints:
      - arm_joint2_to_joint1
      - arm_joint3_to_joint2
      - arm_joint4_to_joint3
      - arm_joint5_to_joint4
      - arm_joint6_to_joint5
      - arm_joint6output_to_joint6
    
    # 指令接口：表示我们打算控制这些关节的“位置(角度)”
    command_interfaces:
      - position
      
    # 状态接口：表示我们想从物理引擎读取它们的“位置”和“速度”
    state_interfaces:
      - position
      - velocity

gripper_controller:
  ros__parameters:
    # 这里只写主动关节（带 motor 的那个）
    joints:
      - arm_gripper_controller
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity